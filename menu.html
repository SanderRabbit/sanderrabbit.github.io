<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<link rel="stylesheet" href="style.css">
</head>
<body class="menu-page">

<div class="menu-bar">
  <a href="https://steamcommunity.com/profiles/76561198083580981/" target="_blank">Steam</a>
  <a href="https://www.tumblr.com/blog/sanderrabbit" target="_blank">Tumblr</a>
  <a href="#" class="info-link" id="info-link">Info</a>
</div>

<script>
const infoMenuLink = document.getElementById("info-link");

const requestInfoWindow = () => {
  const parentWindow = window.parent;

  if (parentWindow && typeof parentWindow.openGlobalInfoWindow === "function") {
    parentWindow.openGlobalInfoWindow();
    return;
  }

  window.top.location.href = "/home/home?info=1";
};

if (infoMenuLink) {
  infoMenuLink.addEventListener("click", (event) => {
    event.preventDefault();
    requestInfoWindow();
  });
}
</script>
</body>
</html>
